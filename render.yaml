databases:
  - name: zabroad-db
    plan: free
    databaseName: zabroad
    user: zabroad

services:
  - type: web
    name: zabroad-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn zabroad_backend.wsgi:application --workers 2 --threads 2 --timeout 60
    healthCheckPath: /api/auth/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: zabroad-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      # ── Media storage (Cloudflare R2 or AWS S3) ──────────────────────────────
      # Uncomment and fill in once you set up R2/S3:
      # - key: USE_S3
      #   value: "True"
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: AWS_STORAGE_BUCKET_NAME
      #   value: "zabroad-media"
      # - key: AWS_S3_ENDPOINT_URL          # Cloudflare R2 endpoint
      #   value: "https://<account-id>.r2.cloudflarestorage.com"
      # - key: AWS_S3_CUSTOM_DOMAIN         # R2 public domain (optional)
      #   value: "media.zabroad.com"
      # ── Email (optional) ─────────────────────────────────────────────────────
